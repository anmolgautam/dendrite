# Alembic configuration for Dendrite.
#
# Used by `dendrite db migrate` and direct `alembic` CLI.
# Override the database URL via DENDRITE_DATABASE_URL env var.

[alembic]
script_location = src/dendrite/db/migrations
prepend_sys_path = .

# Template for new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps (UTC for consistency)
timezone = UTC

# sqlalchemy.url is resolved dynamically in env.py from DENDRITE_DATABASE_URL.
# This value is only used as a fallback if env.py doesn't override it.
sqlalchemy.url = sqlite+aiosqlite:///./dendrite.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
